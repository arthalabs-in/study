name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Compile sources
        run: python -m compileall src

      - name: Smoke imports
        run: |
          python -c "import importlib; [importlib.import_module(name) for name in ['src.app','src.widgets.chat','src.agents.provider','src.agents.agent_manager','src.parsers.pdf_parser','src.parsers.image_parser','src.notes','src.chat_history','src.exporter','src.web_search']]; print('Imported smoke modules successfully')"

      - name: Run pytest
        run: python -m pytest --cov=src --cov-report=term-missing

      - name: Build package artifacts
        run: python -m build --sdist --wheel --no-isolation

      - name: Install pipx
        run: python -m pip install pipx

      - name: Packaging smoke
        run: python scripts/package_smoke.py --wheel "dist/*.whl" --method pipx-install
